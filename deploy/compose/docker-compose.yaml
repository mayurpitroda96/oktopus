services:
  #/* ----------------------------- Message Broker ----------------------------- */
  msg_broker:
    image: "nats:latest"
    container_name: nats
    ports:
      - 4222:4222
      - 8222:8222
    command: -c /tmp/nats/config/nats.cfg
    env_file:
      - .env.nats
    volumes:
      - ./nats_data:/tmp/nats/jetstream
      - ./nats_config:/tmp/nats/config
    profiles: [nats]
  #/* -------------------------------------------------------------------------- */

  #/* ------------------------ API REST / USP Controller ----------------------- */
  controller:
    image: "oktopusp/controller"
    container_name: controller
    ports:
      - 8000:8000
    depends_on:
      - mongo_usp
    env_file:
      - .env.controller
    volumes:
      - ./nats_config:/tmp/nats/config
    profiles: [controller]
  #/* -------------------------------------------------------------------------- */

  #/* ---------------------------- Databases / Cache --------------------------- */
  mongo_usp:
    image: mongo
    container_name: mongo_usp
    ports:
      - 27017:27017
    volumes:
      - ./mongo_data:/data/db
    profiles: [controller, adapter]

  #/* -------------------------------------------------------------------------- */

  #/* ----------------------- Message Transfer Protocols ----------------------- */
  mqtt:
    image: "oktopusp/mqtt"
    container_name: mqtt
    ports:
      - 1883:1883
      - 8883:8883
    env_file:
      - .env.mqtt
    volumes:
      - ./nats_config:/tmp/nats/config
    profiles: [mqtt]

  ws:
    image: "oktopusp/ws"
    container_name: websockets
    ports:
      - 8080:8080
      - 8082:8081
    env_file:
      - .env.ws
    volumes:
      - ./nats_config:/tmp/nats/config
    profiles: [ws]

  stomp:
    image: "oktopusp/stomp"
    container_name: stomp
    ports:
      - 61613:61613
    profiles: [stomp]
  #/* -------------------------------------------------------------------------- */

  #/* --------------- Message transfer Protocols Adapters to NATS -------------- */
  mqtt-adapter:
    image: "oktopusp/mqtt-adapter"
    container_name: mqtt-adapter
    depends_on:
      - mqtt
    env_file:
      - .env.mqtt-adapter
    volumes:
      - ./nats_config:/tmp/nats/config
    profiles: [mqtt]

  ws-adapter:
    image: "oktopusp/ws-adapter"
    container_name: ws-adapter
    depends_on:
      - ws
    env_file:
      - .env.ws-adapter
    volumes:
      - ./nats_config:/tmp/nats/config
    profiles: [ws]

  stomp-adapter:
    image: "oktopusp/stomp-adapter"
    container_name: stomp-adapter
    depends_on:
      - stomp
    env_file:
      - .env.stomp-adapter
    volumes:
      - ./nats_config:/tmp/nats/config
    profiles: [stomp]

  adapter:
    image: "oktopusp/adapter"
    container_name: adapter
    depends_on:
      - mongo_usp
    env_file:
      - .env.adapter
    volumes:
      - ./nats_config:/tmp/nats/config
    profiles: [adapter]
  #/* -------------------------------------------------------------------------- */

  #/* ------------- SocketIO Real Time Communication With Frontend ------------- */
  socketio:
    image: "oktopusp/socketio"
    container_name: socketio
    ports:
      - 5000:5000
    env_file:
      - .env.socketio
    volumes:
      - ./nats_config:/tmp/nats/config
    profiles: [frontend]
  #/* -------------------------------------------------------------------------- */

  #/* -------------------------------- Frontend -------------------------------- */
  frontend:
    image: "oktopusp/frontend"
    container_name: frontend
    ports:
      - 3030:3000
    profiles: [frontend]
  #/* -------------------------------------------------------------------------- */

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    ports:
      - 9443:9443
    profiles: [portainer]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portainer_data:/data

  acs:
    image: "oktopusp/acs"
    container_name: acs
    ports:
      - 9292:9292
    env_file:
      - .env.acs
    volumes:
      - ./nats_config:/tmp/nats/config
    profiles: [cwmp]

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - 8090:80
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    extra_hosts:
      - "host.docker.internal:host-gateway"

  file-server:
    image: oktopusp/file-server
    container_name: file-server
    ports:
      - 8004:8004
    volumes:
      - ./firmwares:/app/firmwares
      - ./images:/app/images
    env_file:
      - .env.file-server

